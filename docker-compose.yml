services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: voluptia-secret
    ports:
      - "${HOST_PORT:-4000}:10000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 10000
      VITE_API_URL: /api
      DATA_DIR: /app/data
      DATABASE_PATH: laccord_secret.sqlite
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:10000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
