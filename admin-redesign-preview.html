<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Volyptia · Console admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    /* Velvet midnight palette */
    --bg:#100711;
    --bg-2:#160a17;
    --ink:#fbeef2;
    --muted:#b598a4;
    --faint:#7d6470;
    --rose:#ff7eb6;
    --rose-deep:#c0286f;
    --gold:#e7c08a;        /* champagne — the velvet-rope accent */
    --mint:#6ee7b7;
    --amber:#f4b350;
    --coral:#ff6f6f;
    --glass:rgba(43,22,40,.58);
    --glass-2:rgba(54,28,50,.5);
    --line:rgba(255,228,240,.09);
    --line-strong:rgba(255,228,240,.16);
    --shadow:0 24px 60px -24px rgba(0,0,0,.7);
    --rail-w:248px;
    --radius:20px;
    --serif:'Fraunces',Georgia,'Times New Roman',serif;
    --sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:var(--sans);
    color:var(--ink);
    background:var(--bg);
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    position:relative;
    overflow-x:hidden;
  }
  /* warm plum ambience instead of flat black */
  body::before{
    content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
    background:
      radial-gradient(820px 520px at 12% -8%, rgba(192,40,111,.30), transparent 60%),
      radial-gradient(700px 560px at 96% 4%, rgba(231,192,138,.10), transparent 55%),
      radial-gradient(900px 700px at 70% 110%, rgba(255,126,182,.12), transparent 60%);
  }
  ::selection{background:rgba(255,126,182,.32)}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  :focus-visible{outline:2px solid var(--rose);outline-offset:2px;border-radius:8px}

  /* ---------- shell ---------- */
  .app{position:relative;z-index:1;min-height:100vh;padding:22px 26px 120px calc(var(--rail-w) + 50px)}

  /* ---------- floating top bar ---------- */
  .topbar{
    position:sticky;top:18px;z-index:40;
    display:flex;align-items:center;gap:16px;
    padding:12px 14px 12px 20px;margin-bottom:26px;
    background:var(--glass);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);
    border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);
  }
  .brandmark{display:flex;align-items:center;gap:11px;min-width:0}
  .orb{
    width:30px;height:30px;border-radius:50%;flex:none;
    background:radial-gradient(circle at 32% 28%, #ffd2e7, var(--rose) 38%, var(--rose-deep) 78%);
    box-shadow:0 0 22px rgba(255,126,182,.55), inset 0 0 8px rgba(255,255,255,.4);
  }
  .brandmark b{font-family:var(--serif);font-weight:600;font-size:1.16rem;letter-spacing:.2px}
  .brandmark span{color:var(--faint);font-size:.72rem;letter-spacing:.16em;text-transform:uppercase}
  .topbar .ctx{margin-left:6px;display:flex;flex-direction:column;line-height:1.15;min-width:0;flex:1}
  .topbar .ctx em{font-style:normal;color:var(--faint);font-size:.68rem;letter-spacing:.18em;text-transform:uppercase}
  .topbar .ctx strong{font-family:var(--serif);font-weight:500;font-size:1.02rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .search{display:flex;align-items:center;gap:8px;background:rgba(0,0,0,.28);border:1px solid var(--line);border-radius:12px;padding:8px 12px;min-width:0;max-width:240px;flex:1}
  .search input{background:none;border:none;color:var(--ink);font-size:.86rem;width:100%;outline:none}
  .search input::placeholder{color:var(--faint)}
  .search svg{flex:none;opacity:.6}
  .icon-btn{width:38px;height:38px;border-radius:11px;border:1px solid var(--line);display:grid;place-items:center;background:rgba(255,255,255,.03);transition:.18s;flex:none}
  .icon-btn:hover{background:rgba(255,126,182,.12);border-color:var(--line-strong);transform:translateY(-1px)}
  .admin-chip{display:flex;align-items:center;gap:9px;padding:5px 12px 5px 6px;border-radius:30px;background:rgba(255,255,255,.04);border:1px solid var(--line);flex:none}
  .admin-chip i{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--gold),#caa063);display:grid;place-items:center;font-style:normal;font-weight:700;color:#3a2410;font-size:.82rem}
  .admin-chip small{font-size:.82rem;color:var(--muted)}
  .admin-chip small b{color:var(--ink);font-weight:600;display:block;line-height:1.1}

  /* ---------- floating tab rail (the signature) ---------- */
  .rail{
    position:fixed;top:18px;left:18px;bottom:18px;width:var(--rail-w);z-index:45;
    display:flex;flex-direction:column;
    padding:18px 14px;
    background:var(--glass);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
    border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);
  }
  .rail-head{padding:6px 10px 16px;border-bottom:1px solid var(--line);margin-bottom:12px}
  .rail-head p{margin:0;font-family:var(--serif);font-size:1.28rem;font-weight:600}
  .rail-head small{color:var(--faint);font-size:.72rem;letter-spacing:.14em;text-transform:uppercase}
  .nav{position:relative;display:flex;flex-direction:column;gap:3px;flex:1;overflow-y:auto;scrollbar-width:none}
  .nav::-webkit-scrollbar{display:none}
  /* sliding glow indicator */
  .nav-glow{
    position:absolute;left:0;right:0;height:46px;border-radius:14px;z-index:0;
    background:linear-gradient(100deg, rgba(255,126,182,.26), rgba(192,40,111,.20));
    border:1px solid rgba(255,126,182,.4);
    box-shadow:0 0 22px rgba(255,126,182,.28), inset 0 0 18px rgba(255,126,182,.1);
    transition:transform .42s cubic-bezier(.34,1.3,.5,1), height .3s ease;
    pointer-events:none;
  }
  .tab{
    position:relative;z-index:1;display:flex;align-items:center;gap:12px;
    padding:11px 12px;border-radius:14px;text-align:left;color:var(--muted);
    transition:color .2s, transform .2s;width:100%;
  }
  .tab i{
    width:30px;height:30px;border-radius:9px;flex:none;display:grid;place-items:center;font-size:1.02rem;
    background:rgba(255,255,255,.05);border:1px solid var(--line);transition:.2s;
  }
  .tab .lbl{display:flex;flex-direction:column;line-height:1.18;min-width:0;flex:1}
  .tab .lbl b{font-weight:600;font-size:.92rem;color:var(--ink);transition:.2s}
  .tab .lbl small{font-size:.7rem;color:var(--faint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tab .count{font-size:.72rem;font-weight:700;color:var(--faint);background:rgba(255,255,255,.05);padding:2px 8px;border-radius:20px;flex:none}
  .tab:hover{color:var(--ink);transform:translateX(2px)}
  .tab:hover i{background:rgba(255,126,182,.14)}
  .tab.active .lbl b{color:#fff}
  .tab.active i{background:linear-gradient(135deg,var(--rose),var(--rose-deep));border-color:transparent;box-shadow:0 6px 16px -6px rgba(192,40,111,.7)}
  .tab.active .count{color:var(--rose);background:rgba(255,126,182,.14)}
  .rail-foot{padding:12px 10px 2px;border-top:1px solid var(--line);margin-top:8px;font-size:.7rem;color:var(--faint);display:flex;align-items:center;gap:7px}
  .pulse{width:7px;height:7px;border-radius:50%;background:var(--mint);box-shadow:0 0 8px var(--mint);animation:pulse 2.4s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

  /* ---------- stage / sections ---------- */
  .stage{max-width:1180px}
  section.view{display:none;animation:rise .5s cubic-bezier(.2,.7,.3,1)}
  section.view.on{display:block}
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  .head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin:4px 0 20px}
  .head .eyebrow{margin:0 0 4px;color:var(--gold);font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;font-weight:600}
  .head h2{margin:0;font-family:var(--serif);font-weight:600;font-size:1.85rem;line-height:1.05}
  .head p.sub{margin:6px 0 0;color:var(--muted);font-size:.9rem;max-width:54ch}

  .glass{background:var(--glass);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
  .grid{display:grid;gap:16px}
  .g2{grid-template-columns:1fr 1fr}
  .g3{grid-template-columns:repeat(3,1fr)}
  .g4{grid-template-columns:repeat(4,1fr)}

  /* KPI cards */
  .kpi{padding:18px 18px 16px;position:relative;overflow:hidden}
  .kpi .ic{width:40px;height:40px;border-radius:12px;display:grid;place-items:center;font-size:1.15rem;margin-bottom:14px;background:rgba(255,255,255,.05);border:1px solid var(--line)}
  .kpi strong{display:block;font-family:var(--serif);font-size:2rem;font-weight:600;line-height:1}
  .kpi span{display:block;color:var(--muted);font-size:.82rem;margin-top:6px}
  .kpi em{font-style:normal;font-size:.74rem;font-weight:600;margin-top:9px;display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px}
  .up{color:var(--mint);background:rgba(110,231,183,.12)}
  .down{color:var(--coral);background:rgba(255,111,111,.12)}
  .kpi.rose .ic{background:linear-gradient(135deg,rgba(255,126,182,.3),rgba(192,40,111,.22));border-color:transparent;color:#fff}
  .kpi.gold .ic{background:linear-gradient(135deg,rgba(231,192,138,.32),rgba(202,160,99,.2));border-color:transparent;color:#3a2410}

  .panel{padding:20px}
  .panel h3{margin:0;font-family:var(--serif);font-weight:600;font-size:1.18rem}
  .panel .ph p{margin:0;color:var(--gold);font-size:.68rem;letter-spacing:.18em;text-transform:uppercase;font-weight:600}
  .ph{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:16px}
  .metrics{display:flex;flex-direction:column;gap:11px}
  .metrics .row{display:flex;align-items:center;justify-content:space-between;font-size:.88rem;color:var(--muted);padding-bottom:11px;border-bottom:1px solid var(--line)}
  .metrics .row:last-child{border:none;padding:0}
  .metrics .row b{color:var(--ink);font-size:1.02rem;font-weight:600}

  /* engagement bars */
  .bars{display:flex;flex-direction:column;gap:14px}
  .bar{display:grid;grid-template-columns:1fr 2.2fr auto;gap:12px;align-items:center}
  .bar .who{display:flex;flex-direction:column;line-height:1.2;font-size:.86rem;font-weight:600}
  .bar .who small{font-weight:400;color:var(--faint);font-size:.72rem}
  .bar .track{height:9px;border-radius:20px;background:rgba(255,255,255,.06);overflow:hidden}
  .bar .track i{display:block;height:100%;border-radius:20px;background:linear-gradient(90deg,var(--rose),var(--rose-deep));box-shadow:0 0 14px rgba(255,126,182,.4)}
  .bar b{font-size:.92rem;min-width:42px;text-align:right}

  .chips-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px;padding-top:16px;border-top:1px solid var(--line)}
  .chips-row span{font-size:.78rem;color:var(--muted);background:rgba(255,255,255,.04);border:1px solid var(--line);padding:6px 11px;border-radius:20px}
  .chips-row span b{color:var(--ink);margin-left:6px}

  /* tables / member rows */
  .toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:16px}
  .seg{display:flex;gap:3px;padding:4px;background:rgba(0,0,0,.26);border:1px solid var(--line);border-radius:13px}
  .seg button{padding:7px 14px;border-radius:9px;font-size:.82rem;font-weight:600;color:var(--muted);transition:.18s}
  .seg button.on{background:linear-gradient(135deg,var(--rose),var(--rose-deep));color:#fff;box-shadow:0 6px 16px -8px var(--rose-deep)}
  .grow{flex:1}
  .ghost-btn{padding:8px 14px;border-radius:11px;border:1px solid var(--line-strong);font-size:.82rem;font-weight:600;color:var(--ink);background:rgba(255,255,255,.03);transition:.18s;display:inline-flex;gap:7px;align-items:center}
  .ghost-btn:hover{background:rgba(255,126,182,.1);transform:translateY(-1px)}

  .list{display:flex;flex-direction:column;gap:9px}
  .item{display:flex;align-items:center;gap:14px;padding:13px 15px;border-radius:15px;background:var(--glass-2);border:1px solid var(--line);transition:.18s;cursor:pointer}
  .item:hover{border-color:var(--line-strong);background:rgba(64,33,58,.62);transform:translateX(2px)}
  .ava{width:44px;height:44px;border-radius:13px;flex:none;display:grid;place-items:center;font-family:var(--serif);font-weight:600;font-size:1.1rem;color:#fff;position:relative}
  .dot{position:absolute;right:-2px;bottom:-2px;width:12px;height:12px;border-radius:50%;border:2.5px solid var(--bg-2)}
  .dot.on{background:var(--mint);box-shadow:0 0 8px var(--mint)}
  .dot.off{background:var(--faint)}
  .who-main{flex:1;min-width:0}
  .who-main .nm{display:flex;align-items:center;gap:8px;font-weight:600;font-size:.96rem}
  .who-main .nm .vrf{color:var(--rose);display:inline-flex}
  .who-main .meta{color:var(--faint);font-size:.78rem;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tags{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end;max-width:280px}
  .tag{font-size:.68rem;font-weight:600;padding:4px 9px;border-radius:20px;white-space:nowrap}
  .t-rose{color:var(--rose);background:rgba(255,126,182,.13)}
  .t-gold{color:var(--gold);background:rgba(231,192,138,.13)}
  .t-mint{color:var(--mint);background:rgba(110,231,183,.13)}
  .t-amber{color:var(--amber);background:rgba(244,179,80,.14)}
  .t-coral{color:var(--coral);background:rgba(255,111,111,.14)}
  .t-mute{color:var(--muted);background:rgba(255,255,255,.05)}
  .chev{color:var(--faint);flex:none}

  /* moderation queue */
  .qcard{padding:16px 18px;border-left:3px solid var(--coral);display:flex;flex-direction:column;gap:12px}
  .qcard.warn{border-left-color:var(--amber)}
  .qcard.low{border-left-color:var(--gold)}
  .qcard .top{display:flex;align-items:center;justify-content:space-between;gap:12px}
  .qcard .top .sev{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:4px 10px;border-radius:20px}
  .qcard p.reason{margin:0;font-size:.9rem;color:var(--ink);line-height:1.5}
  .qcard .by{font-size:.78rem;color:var(--faint)}
  .qcard .acts{display:flex;flex-wrap:wrap;gap:8px;padding-top:4px}
  .act{padding:7px 13px;border-radius:10px;font-size:.8rem;font-weight:600;transition:.16s;border:1px solid transparent}
  .act.warn{color:var(--amber);background:rgba(244,179,80,.12);border-color:rgba(244,179,80,.2)}
  .act.hide{color:var(--muted);background:rgba(255,255,255,.05);border-color:var(--line)}
  .act.ban{color:var(--coral);background:rgba(255,111,111,.12);border-color:rgba(255,111,111,.22)}
  .act.ok{color:var(--mint);background:rgba(110,231,183,.12);border-color:rgba(110,231,183,.2)}
  .act:hover{transform:translateY(-1px);filter:brightness(1.15)}

  /* revenue spark */
  .spark{display:flex;align-items:flex-end;gap:7px;height:120px;margin-top:6px}
  .spark .col{flex:1;border-radius:7px 7px 3px 3px;background:linear-gradient(180deg,var(--rose),rgba(192,40,111,.35));position:relative;transition:.3s;min-height:6px}
  .spark .col:hover{filter:brightness(1.2)}
  .spark .col span{position:absolute;bottom:-22px;left:0;right:0;text-align:center;font-size:.66rem;color:var(--faint)}

  /* promo / influencer cards */
  .promo{padding:16px 18px;display:flex;align-items:center;gap:14px}
  .promo .code{font-family:var(--serif);font-weight:600;font-size:1.05rem;letter-spacing:.5px;padding:8px 14px;border-radius:11px;background:rgba(231,192,138,.1);border:1px dashed rgba(231,192,138,.4);color:var(--gold);flex:none}
  .promo .pinfo{flex:1;min-width:0}
  .promo .pinfo b{font-weight:600;font-size:.92rem}
  .promo .pinfo small{display:block;color:var(--faint);font-size:.78rem;margin-top:2px}
  .switch{width:46px;height:26px;border-radius:20px;background:rgba(255,255,255,.1);position:relative;transition:.22s;flex:none;border:1px solid var(--line)}
  .switch.on{background:linear-gradient(135deg,var(--mint),#3fb98a)}
  .switch::after{content:"";position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.22s}
  .switch.on::after{transform:translateX(20px)}

  /* venues */
  .venue{padding:15px 17px;display:flex;align-items:center;gap:13px}
  .venue .pin{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;flex:none;background:rgba(255,126,182,.12);font-size:1.1rem}
  .venue .vinfo{flex:1;min-width:0}
  .venue .vinfo b{font-weight:600;font-size:.92rem}
  .venue .vinfo small{display:block;color:var(--faint);font-size:.78rem;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  /* system checklist */
  .check{padding:15px 18px;display:flex;align-items:flex-start;gap:13px}
  .check .ck{width:26px;height:26px;border-radius:8px;flex:none;display:grid;place-items:center;font-size:.9rem;font-weight:700;margin-top:1px}
  .check.done .ck{background:rgba(110,231,183,.15);color:var(--mint)}
  .check.todo .ck{background:rgba(244,179,80,.15);color:var(--amber)}
  .check.block .ck{background:rgba(255,111,111,.15);color:var(--coral)}
  .check .cb{flex:1}
  .check .cb b{font-weight:600;font-size:.92rem}
  .check .cb small{display:block;color:var(--muted);font-size:.81rem;margin-top:3px;line-height:1.5}
  .check .ctag{font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:4px 9px;border-radius:20px;flex:none;margin-top:1px}

  /* ---------- floating drawer ---------- */
  .scrim{position:fixed;inset:0;z-index:60;background:rgba(8,3,8,.6);backdrop-filter:blur(4px);opacity:0;visibility:hidden;transition:.25s}
  .scrim.on{opacity:1;visibility:visible}
  .drawer{position:fixed;top:14px;right:14px;bottom:14px;width:min(420px,calc(100vw - 28px));z-index:61;
    background:var(--glass);backdrop-filter:blur(26px);-webkit-backdrop-filter:blur(26px);
    border:1px solid var(--line-strong);border-radius:24px;box-shadow:var(--shadow);
    transform:translateX(calc(100% + 24px));transition:transform .4s cubic-bezier(.3,.9,.3,1);
    display:flex;flex-direction:column;overflow:hidden}
  .drawer.on{transform:none}
  .drawer .dh{padding:22px 22px 18px;border-bottom:1px solid var(--line);position:relative}
  .drawer .dh .x{position:absolute;top:18px;right:18px;width:34px;height:34px;border-radius:10px;border:1px solid var(--line);display:grid;place-items:center;background:rgba(255,255,255,.04)}
  .drawer .dh .x:hover{background:rgba(255,111,111,.14)}
  .dbody{padding:20px 22px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:18px}
  .duser{display:flex;align-items:center;gap:14px}
  .duser .ava{width:58px;height:58px;border-radius:16px;font-size:1.4rem}
  .duser h3{margin:0;font-family:var(--serif);font-size:1.3rem;font-weight:600}
  .duser p{margin:3px 0 0;color:var(--faint);font-size:.84rem}
  .dgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .dstat{background:rgba(0,0,0,.22);border:1px solid var(--line);border-radius:13px;padding:12px 14px}
  .dstat span{display:block;color:var(--faint);font-size:.72rem;text-transform:uppercase;letter-spacing:.08em}
  .dstat b{display:block;font-family:var(--serif);font-size:1.3rem;font-weight:600;margin-top:4px}
  .dsec-label{font-size:.7rem;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);font-weight:600}
  .dacts{display:grid;grid-template-columns:1fr 1fr;gap:9px}
  .dact{padding:12px;border-radius:13px;font-size:.85rem;font-weight:600;border:1px solid var(--line);background:rgba(255,255,255,.04);display:flex;align-items:center;gap:9px;transition:.16s;text-align:left}
  .dact:hover{transform:translateY(-1px);background:rgba(255,126,182,.1)}
  .dact.danger{color:var(--coral);border-color:rgba(255,111,111,.25);background:rgba(255,111,111,.08)}
  .dact.danger:hover{background:rgba(255,111,111,.16)}
  .dact.gold{color:var(--gold);border-color:rgba(231,192,138,.25);background:rgba(231,192,138,.08)}
  .dact.gold:hover{background:rgba(231,192,138,.16)}
  .dact .di{font-size:1.05rem}

  /* ---------- floating FAB ---------- */
  .fab{position:fixed;right:26px;bottom:26px;z-index:50;height:56px;padding:0 22px 0 18px;border-radius:30px;

function renderMembers(){
  const q=($('#globalSearch')?.value||'').toLowerCase();
  let rows=members.filter(m=>{
    if(memberFilter==='Vérifiés'&&!m.verified)return false;
    if(memberFilter==='Premium'&&!m.premium)return false;
    if(memberFilter==='Suspendus'&&m.status!=='suspended')return false;
    if(memberFilter==='Masqués'&&m.status!=='hidden')return false;
    if(memberFilter==='Admins'&&m.role!=='admin')return false;
    if(q&&!(m.pseudo.toLowerCase().includes(q)||m.city.toLowerCase().includes(q)))return false;
    return true;
  });
  if(!rows.length)return `<div class="glass panel" style="text-align:center;color:var(--muted)">Aucun membre ne correspond. <br><small style="color:var(--faint)">Ajustez le filtre ou la recherche.</small></div>`;
  return rows.map(m=>{
    const tags=[];
    if(m.role==='admin')tags.push('<span class="tag t-gold">Admin</span>');
    if(m.role==='influencer')tags.push('<span class="tag t-rose">Influenceur</span>');
    if(m.premium)tags.push('<span class="tag t-gold">Premium</span>');
    if(m.verified)tags.push('<span class="tag t-mint">Vérifié</span>');
    if(m.status==='suspended')tags.push('<span class="tag t-coral">Suspendu</span>');
    if(m.status==='hidden')tags.push('<span class="tag t-mute">Masqué</span>');
    return `<div class="item" onclick="openDrawer(${m.id})">
      <div class="ava" style="background:${avaFor(m.id)}">${initial(m.pseudo)}<span class="dot ${m.online?'on':'off'}"></span></div>
      <div class="who-main">
        <div class="nm">${m.pseudo} ${m.verified?'<span class="vrf">✓</span>':''}</div>
        <div class="meta">${m.type} · ${m.city} · ${m.age} ans · inscrit ${m.joined}</div>
      </div>
      <div class="tags">${tags.join('')}</div>
      <span class="chev">›</span>
    </div>`;
  }).join('');
}

let active='overview';
function buildNav(){
  // rail
  const nav=$('#nav');
  NAV.forEach(n=>{
    const b=document.createElement('button');
    b.className='tab'+(n.id===active?' active':'');
    b.dataset.id=n.id;
    b.innerHTML=`<i>${n.icon}</i><span class="lbl"><b>${n.label}</b><small>${n.sub}</small></span>${n.count?`<span class="count">${n.count}</span>`:''}`;
    b.onclick=()=>go(n.id);
    nav.appendChild(b);
  });
  // mobile dock
  const dockShort={overview:'Accueil',members:'Membres',viewas:'Profils',moderation:'Modé.',revenue:'Revenus',influencers:'Influ.',promos:'Codes',venues:'Lieux',system:'Système'};
  const dock=$('#dock');
  NAV.forEach(n=>{
    const b=document.createElement('button');
    b.className=(n.id===active?'on':'');
    b.dataset.id=n.id;
    b.innerHTML=`<i>${n.icon}</i><small>${dockShort[n.id]||n.label}</small>`;
    b.onclick=()=>go(n.id);
    dock.appendChild(b);
  });
}
function moveGlow(){
  const el=document.querySelector('.tab.active');
  const glow=$('#glow');
  if(el){glow.style.height=el.offsetHeight+'px';glow.style.transform=`translateY(${el.offsetTop}px)`;}
}
function go(id){
  active=id;
  const meta=NAV.find(n=>n.id===id);
  $('#ctxTitle').textContent=meta.label;
  $('#ctxEyebrow').textContent=meta.eyebrow;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.id===id));
  document.querySelectorAll('.dock button').forEach(t=>t.classList.toggle('on',t.dataset.id===id));
  moveGlow();
  // render view
  stage.querySelectorAll('section.view').forEach(s=>s.remove());
  const sec=document.createElement('section');
  sec.className='view on';
  sec.innerHTML=VIEWS[id]();
  stage.appendChild(sec);
  // fab label per section
  const fabMap={members:'Créer un compte',promos:'Nouveau code',influencers:'Ajouter un partenaire',venues:'Ajouter un lieu',moderation:'Voir l\'historique'};
  const fab=$('#fab');
  if(fabMap[id]){fab.style.display='flex';$('#fabLabel').textContent=fabMap[id];}
  else{fab.style.display=['overview','revenue','system','viewas'].includes(id)?'none':'flex';}
  window.scrollTo({top:0,behavior:'smooth'});
}
function togglePromo(el,code){
  el.classList.toggle('on');
  toast('Code '+code+(el.classList.contains('on')?' activé':' désactivé'),'ok');
}
function fabAction(){
  const map={members:'Formulaire de création de compte',promos:"Création d'un code promo",influencers:"Ajout d'un influenceur",venues:"Ajout d'un lieu"};
  toast((map[active]||'Nouvel élément')+' — ouverture…','ok');
}

/* search live */
$('#globalSearch').addEventListener('input',()=>{
  if(active!=='members')go('members');
  else $('#memberList').innerHTML=renderMembers();
});

window.addEventListener('resize',moveGlow);
buildNav();
go('overview');
setTimeout(moveGlow,150); // after fonts settle
</script>
</body>
</html>
